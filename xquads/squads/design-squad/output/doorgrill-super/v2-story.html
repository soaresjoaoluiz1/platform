<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DoorGrill Super — V2 Story</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #111;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 40px;
      font-family: 'Sora', sans-serif;
    }

    /* ============================================
       CANVAS: 1080x1920 Story — V2 "Premium"
       Safe zones:
         TOP    0–270px   → Instagram profile UI (keep clear)
         BOTTOM 1620–1920 → Instagram link/swipe area (keep clear)
       ============================================ */
    .canvas {
      width: 1080px;
      height: 1920px;
      position: relative;
      overflow: hidden;
      background: #0a0a0a;
      flex-shrink: 0;
    }

    /* Gold top border */
    .top-border {
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 6px;
      background: linear-gradient(90deg, #eeb23e 0%, #f5c660 50%, #eeb23e 100%);
      z-index: 2;
    }

    /* ── PRODUCT IMAGE — full bleed from top ── */
    .product-area {
      position: absolute;
      left: 0; right: 0;
      top: 0;
      height: 1300px;
      overflow: hidden;
    }

    .product-img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center 25%;
    }

    /* small dark strip at top */
    .product-fade-top {
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 220px;
      background: linear-gradient(180deg, rgba(10,10,10,0.55) 0%, transparent 100%);
    }

    /* large fade at bottom */
    .product-fade-bottom {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      height: 520px;
      background: linear-gradient(0deg, #0a0a0a 0%, rgba(10,10,10,0.9) 40%, transparent 100%);
    }

    /* Glow */
    .bg-glow {
      position: absolute;
      left: 50%;
      top: 1150px;
      transform: translateX(-50%);
      width: 800px;
      height: 700px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(238,178,62,0.07) 0%, transparent 65%);
      pointer-events: none;
    }

    /* ── HEADLINE — visible above safe zone, below Instagram profile ── */
    .headline-section {
      position: absolute;
      top: 300px;
      left: 80px;
      right: 80px;
    }

    .headline-eyebrow {
      display: flex;
      align-items: center;
      gap: 16px;
      margin-bottom: 30px;
    }

    .eyebrow-line {
      width: 52px;
      height: 3px;
      background: #eeb23e;
      border-radius: 100px;
    }

    .eyebrow-text {
      font-size: 22px;
      font-weight: 700;
      color: #eeb23e;
      letter-spacing: 0.14em;
      text-transform: uppercase;
    }

    .headline-title {
      font-size: 160px;
      font-weight: 800;
      color: #fff;
      line-height: 0.86;
      letter-spacing: -0.03em;
      text-transform: uppercase;
    }

    .headline-gold {
      color: #eeb23e;
    }

    .headline-sub {
      font-size: 30px;
      font-weight: 300;
      color: #ddd;
      margin-top: 30px;
      line-height: 1.5;
      letter-spacing: 0.02em;
    }

    /* ── PRICE SECTION — safe above bottom zone ── */
    .price-section {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      padding: 0 80px 380px;
      display: flex;
      flex-direction: column;
      gap: 36px;
    }

    /* Features strip */
    .features-strip {
      display: flex;
      gap: 14px;
      flex-wrap: wrap;
    }

    .feature-chip {
      background: rgba(255,255,255,0.07);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 100px;
      padding: 14px 26px;
      font-size: 22px;
      font-weight: 500;
      color: #ddd;
    }

    /* Price card */
    .price-card {
      background: rgba(238,178,62,0.07);
      border: 1.5px solid rgba(238,178,62,0.28);
      border-radius: 28px;
      padding: 52px 60px;
      position: relative;
      overflow: hidden;
    }

    .price-card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 3px;
      background: linear-gradient(90deg, #eeb23e, transparent);
    }

    .price-card-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 30px;
    }

    .price-card-title {
      font-size: 20px;
      font-weight: 700;
      color: #eeb23e;
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }

    .economy-badge {
      background: #e84848;
      border-radius: 12px;
      padding: 14px 24px;
      text-align: center;
    }

    .economy-badge-label {
      font-size: 20px;
      font-weight: 600;
      color: rgba(255,255,255,0.9);
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    .economy-badge-value {
      font-size: 52px;
      font-weight: 800;
      color: #fff;
      line-height: 1.1;
    }

    .price-from {
      font-size: 28px;
      font-weight: 400;
      color: #bbb;
      text-decoration: line-through;
      text-decoration-color: #e84848;
      margin-bottom: 12px;
    }

    .price-main {
      display: flex;
      align-items: baseline;
      gap: 6px;
    }

    .price-currency {
      font-size: 46px;
      font-weight: 700;
      color: #fff;
    }

    .price-value {
      font-size: 130px;
      font-weight: 800;
      color: #fff;
      line-height: 1;
      letter-spacing: -0.04em;
    }

    .price-cents {
      font-size: 46px;
      font-weight: 700;
      color: #fff;
      align-self: flex-start;
      margin-top: 26px;
    }

    .price-note {
      font-size: 22px;
      color: #ddd;
      margin-top: 12px;
    }

    /* CTA */
    .cta-btn {
      background: #eeb23e;
      color: #0a0a0a;
      font-size: 30px;
      font-weight: 800;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      padding: 36px 60px;
      border-radius: 100px;
      text-align: center;
      box-shadow: 0 10px 50px rgba(238,178,62,0.3);
    }

    /* Handle */
    .handle {
      position: absolute;
      bottom: 330px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 22px;
      font-weight: 600;
      color: #444;
      letter-spacing: 0.06em;
      white-space: nowrap;
    }
    .opencode-credit {
      position: absolute;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 14px;
      font-weight: 600;
      color: #666;
      letter-spacing: 0.08em;
    }
  </style>
</head>
<body>

<div class="canvas">
  <div class="top-border"></div>
  <div class="bg-glow"></div>

  <!-- PRODUCT IMAGE — full bleed from top -->
  <div class="product-area">
    <img src="file:///C:/Users/usuar/Downloads/drive-download-20260325T172532Z-3-001/05.jpeg" class="product-img">
    <div class="product-fade-top"></div>
    <div class="product-fade-bottom"></div>
  </div>

  <!-- HEADLINE — positioned below Instagram profile zone -->
  <div class="headline-section">
    <div class="headline-eyebrow">
      <div class="eyebrow-line"></div>
      <div class="eyebrow-text">Lançamento exclusivo</div>
    </div>
    <div class="headline-title">Linha</div>
    <div class="headline-sub">Alta performance, design exclusivo e<br>o melhor churrasco da sua vida.</div>
  </div>

  <!-- PRICE SECTION — safe above Instagram link zone -->
  <div class="price-section">

    <div class="features-strip">
      <div class="feature-chip">🔧 Personalizada</div>
      <div class="feature-chip">⭐ Garantia inclusa</div>
    </div>

    <div class="price-card">
      <div class="price-card-header">
        <div class="price-card-title">Oferta especial de lançamento</div>
        <div class="economy-badge">
          <div class="economy-badge-label">Economia</div>
          <div class="economy-badge-value">R$ 1.500</div>
        </div>
      </div>
      <div class="price-from">De R$ 6.990,00</div>
      <div class="price-main">
        <span class="price-currency">R$</span>
        <span class="price-value">5.490</span>
        <span class="price-cents">,00</span>
      </div>
      <div class="price-note">à vista • consulte parcelamento</div>
    </div>

    <div class="cta-btn">🔥 Quero minha Linha</div>

  </div>

  <div class="handle">@doorgrill_projetos</div>
  <div class="opencode-credit">opencode</div>

</div>

</body>
</html>
