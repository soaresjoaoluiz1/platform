<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DoorGrill Super — V1 Feed</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #111;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 40px;
      font-family: 'Sora', sans-serif;
    }

    /* ============================================
       CANVAS: 1080x1080 Feed — V1 "Impacto"
       Full-bleed product photo, text overlay
       Bottom ~220px clear for Instagram ad controls
       ============================================ */
    .canvas {
      width: 1080px;
      height: 1080px;
      position: relative;
      overflow: hidden;
      background: #0a0a0a;
      flex-shrink: 0;
    }

    /* FULL-BLEED PRODUCT IMAGE */
    .product-bg {
      position: absolute;
      inset: 0;
    }

    .product-img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center 40%;
    }

    /* Dark overlays */
    .overlay-top {
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 260px;
      background: linear-gradient(180deg, rgba(0,0,0,0.75) 0%, transparent 100%);
    }

    .overlay-bottom {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      height: 640px;
      background: linear-gradient(0deg, rgba(0,0,0,0.96) 0%, rgba(0,0,0,0.78) 45%, transparent 100%);
    }

    /* Gold top bar */
    .top-bar {
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 5px;
      background: linear-gradient(90deg, #eeb23e 0%, #f5c660 60%, #eeb23e 100%);
    }

    /* TOP CONTENT */
    .top-content {
      position: absolute;
      top: 50px;
      left: 60px;
      right: 60px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .logo-text {
      font-size: 36px;
      font-weight: 800;
      color: #eeb23e;
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }

    .promo-pill {
      background: rgba(238,178,62,0.18);
      border: 1.5px solid rgba(238,178,62,0.5);
      border-radius: 100px;
      padding: 12px 28px;
      font-size: 18px;
      font-weight: 700;
      color: #eeb23e;
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }

    /* BOTTOM CONTENT — ends ~220px from bottom */
    .bottom-content {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      padding: 0 60px 250px;
      display: flex;
      flex-direction: column;
      gap: 30px;
    }

    /* Eyebrow label */
    .section-label {
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .label-line {
      width: 44px;
      height: 3px;
      background: #eeb23e;
      border-radius: 100px;
    }

    .label-text {
      font-size: 22px;
      font-weight: 700;
      color: #eeb23e;
      letter-spacing: 0.14em;
      text-transform: uppercase;
    }

    /* Headline */
    .product-title {
      font-size: 120px;
      font-weight: 800;
      color: #ffffff;
      line-height: 0.88;
      letter-spacing: -0.03em;
      text-transform: uppercase;
    }

    .product-title-sub {
      font-size: 26px;
      font-weight: 400;
      color: #ddd;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      margin-top: 14px;
    }

    /* Price row */
    .price-row {
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      gap: 20px;
    }

    .price-left {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .price-old {
      font-size: 26px;
      font-weight: 500;
      color: #bbb;
      text-decoration: line-through;
      text-decoration-color: #e84848;
    }

    .price-new-row {
      display: flex;
      align-items: baseline;
      gap: 5px;
    }

    .price-currency {
      font-size: 36px;
      font-weight: 700;
      color: #fff;
    }

    .price-value {
      font-size: 110px;
      font-weight: 800;
      color: #fff;
      line-height: 1;
      letter-spacing: -0.03em;
    }

    .price-cents {
      font-size: 36px;
      font-weight: 700;
      color: #fff;
      align-self: flex-start;
      margin-top: 20px;
    }

    .price-note {
      font-size: 20px;
      color: #ddd;
    }

    /* Discount block */
    .discount-block {
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 12px;
      flex-shrink: 0;
    }

    .discount-box {
      background: #e84848;
      border-radius: 16px;
      padding: 20px 32px;
      text-align: center;
    }

    .discount-box-label {
      font-size: 20px;
      font-weight: 600;
      color: rgba(255,255,255,0.9);
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    .discount-box-value {
      font-size: 54px;
      font-weight: 800;
      color: #fff;
      line-height: 1.1;
    }

    .cta-link {
      font-size: 20px;
      font-weight: 700;
      color: #eeb23e;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      text-decoration: underline;
      text-underline-offset: 4px;
    }

    /* Handle */
    .handle {
      position: absolute;
      bottom: 220px;
      right: 60px;
      font-size: 20px;
      font-weight: 500;
      color: #555;
      letter-spacing: 0.04em;
    }

    /* opencode credit */
    .opencode-credit {
      position: absolute;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 14px;
      font-weight: 600;
      color: #666;
      letter-spacing: 0.08em;
    }
  </style>
</head>
<body>

<div class="canvas">

  <!-- BACKGROUND -->
  <div class="product-bg">
    <img src="file:///C:/Users/usuar/Downloads/drive-download-20260325T172532Z-3-001/03.jpeg" class="product-img">
  </div>

  <!-- OVERLAYS -->
  <div class="overlay-top"></div>
  <div class="overlay-bottom"></div>
  <div class="top-bar"></div>

  <!-- TOP -->
  <div class="top-content">
    <div class="logo-text">DoorGrill</div>
    <div class="promo-pill">✦ Oferta Especial</div>
  </div>

  <!-- BOTTOM -->
  <div class="bottom-content">

    <div class="section-label">
      <div class="label-line"></div>
      <div class="label-text">Nova</div>
    </div>

    <div>
      <div class="product-title">Linha</div>
      <div class="product-title-sub">Churrasqueiras Rotativas · Feitas Sob Medida</div>
    </div>

    <div class="price-row">
      <div class="price-left">
        <div class="price-old">De R$ 6.990,00</div>
        <div class="price-new-row">
          <span class="price-currency">R$</span>
          <span class="price-value">5.490</span>
          <span class="price-cents">,00</span>
        </div>
        <div class="price-note">à vista • consulte parcelamento</div>
      </div>
      <div class="discount-block">
        <div class="discount-box">
          <div class="discount-box-label">Desconto de</div>
          <div class="discount-box-value">R$ 1.500</div>
        </div>
        <div class="cta-link">↗ Link na bio</div>
      </div>
    </div>

  </div>

  <div class="handle">@doorgrill_projetos</div>
  <div class="opencode-credit">opencode</div>

</div>

</body>
</html>
