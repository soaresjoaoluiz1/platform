      - paragraph [ref=e75]: Só que, olhando para a pequena e média indústria, o desafio é outro. Tem dono de fábrica que sabe produzir, sabe entregar, sabe resolver problema, mas ainda não tem clareza de onde a venda está travando.
      - paragraph [ref=e76]: E aí o que acontece?
      - paragraph [ref=e77]: Um mês vende bem. No outro cai. O cliente chama e ninguém responde rápido. O representante atende uma região, mas outra fica parada. Tem cliente antigo que comprou uma vez e nunca mais voltou. E o dono fica tentando adivinhar onde está o erro.
