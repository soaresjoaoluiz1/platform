<svg viewBox="0 0 1200 360" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="ELEVE — Aerospace Carbon Fiber">
  <defs>
    <linearGradient id="goldMetal" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="#FFF5A8"/>
      <stop offset="35%"  stop-color="#FFD100"/>
      <stop offset="70%"  stop-color="#D49A00"/>
      <stop offset="100%" stop-color="#8A6400"/>
    </linearGradient>
    <linearGradient id="goldEdge" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="#FFD100"/>
      <stop offset="100%" stop-color="#B88200"/>
    </linearGradient>
  </defs>

  <!-- chevron mark: sharp V pointing up, metallic gold -->
  <g transform="translate(600, 130) skewX(-10)">
    <path d="M -135 52 L 0 -70 L 135 52 L 78 52 L 0 -10 L -78 52 Z" fill="url(#goldMetal)" stroke="url(#goldEdge)" stroke-width="1.5"/>
    <!-- inner subtle specular line -->
    <path d="M -50 5 L 0 -38 L 50 5" fill="none" stroke="#FFF8C8" stroke-width="2" opacity="0.55"/>
  </g>

  <!-- wordmark — slanted, condensed, athletic -->
  <g transform="translate(600, 270)">
    <text text-anchor="middle"
          font-family="'Oswald', 'Impact', 'Arial Narrow', sans-serif"
          font-weight="800" font-size="148" letter-spacing="16" fill="#0A0A0A"
          transform="skewX(-10)">ELEVE</text>
  </g>

  <!-- support line -->
  <text x="600" y="325" text-anchor="middle"
        font-family="'Inter', 'Helvetica Neue', Arial, sans-serif"
        font-weight="600" font-size="13" letter-spacing="10" fill="#6b6b6b">AEROSPACE CARBON FIBER · MADE IN BRAZIL</text>
</svg>
